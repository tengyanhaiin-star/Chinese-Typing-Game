<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字训练</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Noto+Sans+SC:wght@400&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        button, input {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 400;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 400;
            overflow: hidden; /* 防止3D标签引起滚动条 */
            user-select: none; /* 防止选择文字作弊 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }
        
        @keyframes pulse-custom {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .animate-ping {
            animation: ping 0.5s cubic-bezier(0, 0, 0.2, 1);
        }
        
        .animate-pulse {
            animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .bg-gradient-blue {
            background: linear-gradient(to bottom right, #eff6ff, #e0e7ff);
        }
        
        .bg-gradient-red {
            background: linear-gradient(to bottom right, #f9fafb, #e5e7eb); /* 灰白色背景 */
        }
        
        .title {
            font-size: 3rem;
            font-weight: 400;
            color: #4338ca;
            margin-bottom: 4rem;
        }
        
        .btn {
            padding: 1rem 3rem;
            font-size: 1.25rem;
            font-weight: 400;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .btn-primary {
            background-color: #4f46e5;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #4338ca;
        }
        
        .btn-danger {
            background-color: #dc2626;
            color: white;
        }
        
        .btn-danger:hover {
            background-color: #b91c1c;
        }
        
        .btn-secondary {
            background-color: #4b5563;
            color: white;
            padding: 0.75rem 2rem;
            font-size: 1.125rem;
        }
        
        .btn-secondary:hover {
            background-color: #374151;
        }
        
        .card {
            background: white;
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 20rem;
            font-size: 1rem;
            color: #374151;
        }
        
        .card p {
            margin-bottom: 0.5rem;
        }
        
        .card p:last-child {
            margin-bottom: 0;
        }
        
        .flex-row {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .flex-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-container {
            width: 100%;
            max-width: 42rem;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }
        
        .stat {
            font-size: 1.5rem;
            font-weight: 400;
            color: #4338ca;
        }
        
        .stat-value {
            font-size: 1.875rem;
        }
        
        .word-display {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .pinyin {
            color: #6b7280;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
        }
        
        .word {
            font-size: 3.75rem;
            font-weight: 400;
            color: #312e81;
        }
        
        .input-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        input[type="text"] {
            padding: 1rem 1.5rem;
            font-size: 1.875rem;
            text-align: center;
            border: 4px solid #818cf8;
            border-radius: 0.5rem;
            outline: none;
            width: 24rem;
        }
        
        input[type="text"]:focus {
            border-color: #4338ca;
        }
        
        .survival-input {
            width: 10rem; /* 缩短宽度 */
            font-size: 1rem;
            padding: 0.5rem 0.75rem;
            border: 2px solid #9ca3af; /* 灰色边框，低饱和度 */
            background: transparent; /* 无填充色 */
            color: #374151; /* 深灰色文字 */
        }
        
        .survival-input:focus {
            border-color: #6b7280; /* 聚焦时稍深的灰色 */
            outline: none;
        }
        
        .ultimate-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-top: 10rem;
            font-size: 1.5rem;
            font-weight: 400;
            animation: ultimate-glow 1s ease-in-out infinite alternate;
            z-index: 20;
            display: none;
            text-align: center;
        }
        
        /* 不同大招的颜色 */
        .ultimate-shield {
            color: #22c55e; /* 绿色 - 护盾 */
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.8), 0 0 20px rgba(34, 197, 94, 0.6);
        }
        
        .ultimate-freeze {
            color: #60a5fa; /* 冰蓝色 - 冻结 */
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.8), 0 0 20px rgba(96, 165, 250, 0.6);
        }
        
        .ultimate-firstaid {
            color: #ef4444; /* 红色 - 医疗包 */
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.8), 0 0 20px rgba(239, 68, 68, 0.6);
        }
        
        .ultimate-revive {
            color: #fbbf24; /* 金色 - 复活甲 */
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.8), 0 0 20px rgba(251, 191, 36, 0.6);
        }
        
        .ultimate-teleport {
            color: #a78bfa; /* 紫色 - 物换星移 */
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.8), 0 0 20px rgba(167, 139, 250, 0.6);
        }
        
        .ultimate-judgment {
            color: #f59e0b; /* 橙金色 - 命运审判 */
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.8), 0 0 20px rgba(245, 158, 11, 0.6);
        }
        
        @keyframes ultimate-glow {
            from {
                text-shadow: 0 0 10px rgba(251, 191, 36, 0.8), 0 0 20px rgba(251, 191, 36, 0.6);
            }
            to {
                text-shadow: 0 0 15px rgba(251, 191, 36, 1), 0 0 30px rgba(251, 191, 36, 0.8);
            }
        }
        
        .shield-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-top: -4rem; /* 从-6rem改为-4rem，向下移动 */
            display: flex;
            gap: 0.5rem;
            z-index: 21;
        }
        
        .shield-icon {
            /* 移除背景和边框，只显示盾牌emoji */
            background: none;
            border: none;
            box-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem; /* 稍微放大盾牌 */
        }
        
        .relative {
            position: relative;
        }
        
        .absolute {
            position: absolute;
        }
        
        .fixed-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .input-top-below {
            position: absolute;
            top: 4rem; /* 在计时器下方 */
            left: 50%;
            transform: translateX(-50%);
        }
        
        .top-center {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        
        .input-top {
            position: absolute;
            top: 4.5rem; /* 在计时器下方 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }
        
        .bottom-center {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        
        .health-circle {
            position: relative;
        }
        
        .health-inner {
            width: 4rem; /* 缩小 */
            height: 4rem; /* 缩小 */
            border-radius: 50%;
            background-color: transparent; /* 去除背景色 */
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none !important; /* 强制无阴影 */
            filter: none !important; /* 强制无滤镜 */
            border: 3px solid #d1d5db; /* 浅灰色边框 */
            transition: border-color 0.3s;
        }
        
        .health-inner-revive {
            border-color: #d4a574; /* 低饱和度金色边框 */
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.4);
            animation: revive-border-glow 1s ease-in-out infinite alternate;
        }
        
        @keyframes revive-border-glow {
            from {
                box-shadow: 0 0 15px rgba(212, 165, 116, 0.4);
            }
            to {
                box-shadow: 0 0 20px rgba(212, 165, 116, 0.6);
            }
        }
        
        .health-value {
            color: #374151; /* 深灰色数字 */
            font-size: 1.25rem;
            font-weight: 400;
        }
        
        .survival-word {
            position: absolute;
            transition: all 0.1s;
            text-align: center;
        }
        
        .survival-word .pinyin {
            font-size: 0.875rem;
            color: #4b5563;
        }
        
        .survival-word .word {
            font-size: 1.5rem;
            color: #b91c1c;
        }
        
        .explosion {
            position: absolute;
            pointer-events: none;
            z-index: 30;
        }
        
        .explosion-outer {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .explosion-inner {
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            animation: pulse 0.5s ease-out;
        }
        
        .explosion-success .explosion-outer {
            background-color: #22c55e;
        }
        
        .explosion-success .explosion-inner {
            background-color: #facc15;
        }
        
        .explosion-fail .explosion-outer {
            background-color: #ef4444;
        }
        
        .explosion-fail .explosion-inner {
            background-color: #ea580c;
        }
        
        .result-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .result-card {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
        }
        
        .result-title {
            font-size: 2.25rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
        }
        
        .result-score {
            font-size: 3.75rem;
            font-weight: 400;
            margin-bottom: 1rem;
        }
        
        .result-time {
            font-size: 1.25rem;
            color: #4b5563;
            margin-bottom: 2rem;
        }
        
        .overflow-hidden {
            overflow: hidden;
        }
        
        .min-h-screen {
            min-height: 100vh;
        }
        
        .pointer-events-none {
            pointer-events: none;
        }
        
        .z-10 {
            z-index: 10;
        }
        
        .z-20 {
            z-index: 20;
        }
        
        .z-30 {
            z-index: 30;
        }
        
        .gap-2 {
            gap: 2rem;
        }
        
        .mb-4 {
            margin-bottom: 1rem;
        }
        
        .font-semibold {
            font-weight: 400;
        }
        
        /* 3D场景容器 */
        #three-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* 3D文字标签 */
        .word-label-3d {
            position: absolute;
            color: #6b7280; /* 汉字改成灰色 */
            font-size: 1.5rem; /* 汉字大小与大招一致 */
            font-weight: 400;
            text-align: center;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            z-index: 10;
            white-space: nowrap;
        }
        
        .word-label-3d .pinyin {
            font-size: 0.875rem; /* 拼音大小与大招一致 */
            color: #6b7280; /* 灰色，与汉字一致 */
            margin-bottom: 0.25rem;
        }
        
        .word-label-3d .word-text {
            font-size: 1.5rem; /* 汉字大小与大招一致 */
            color: #6b7280; /* 灰色 */
            font-weight: 400;
        }
    </style>
</head>

        // 初始化3D场景
        function init3DScene() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f5f5); // 灰白色背景，低饱和度
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                2000
            );
            camera.position.z = 900; // 调整镜头距离
            
            // 创建渲染器
            const container = document.getElementById('three-container');
            if (!container) {
                console.error('three-container not found');
                return;
            }
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
            
            // 添加环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            // 添加点光源
            const pointLight = new THREE.PointLight(0xffffff, 1, 1000);
            pointLight.position.set(0, 0, 300);
            scene.add(pointLight);
            
            // 创建主角球体（完全透明）
            const heroGeometry = new THREE.SphereGeometry(35, 32, 32); // 缩小尺寸
            const heroMaterial = new THREE.MeshBasicMaterial({
                color: 0xd1d5db, // 浅灰色
                transparent: true,
                opacity: 0, // 完全透明
                wireframe: false
            });
            heroSphere = new THREE.Mesh(heroGeometry, heroMaterial);
            scene.add(heroSphere);
            
            // 不添加3D边框线，只保留2D HTML边框
            // const edgesGeometry = new THREE.EdgesGeometry(heroGeometry);
            // const edgesMaterial = new THREE.LineBasicMaterial({ 
            //     color: 0x6b7280, // 深灰色边框
            //     linewidth: 2 
            // });
            // const heroEdges = new THREE.LineSegments(edgesGeometry, edgesMaterial);
            // heroSphere.add(heroEdges);
            
            // 立即渲染一帧，避免黑屏闪烁
            renderer.render(scene, camera);
            
            // 监听窗口大小变化
            window.addEventListener('resize', onWindowResize3D, false);
        }
        
        // 窗口大小改变时调整3D场景
        function onWindowResize3D() {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 清理3D场景
        function cleanup3DScene() {
            if (renderer) {
                const container = document.getElementById('three-container');
                if (container && renderer.domElement) {
                    container.removeChild(renderer.domElement);
                }
                renderer.dispose();
                renderer = null;
            }
            
            // 清理所有敌人球体
            enemySpheres.forEach(enemy => {
                if (enemy.mesh) {
                    scene.remove(enemy.mesh);
                    enemy.mesh.geometry.dispose();
                    enemy.mesh.material.dispose();
                }
            });
            enemySpheres = [];
            
            // 清理所有文字标签
            wordLabels.forEach(label => {
                if (label.element && label.element.parentNode) {
                    label.element.parentNode.removeChild(label.element);
                }
            });
            wordLabels = [];
            
            scene = null;
            camera = null;
            heroSphere = null;
            
            window.removeEventListener('resize', onWindowResize3D);
        }
        
        // 在球面上生成随机位置
        function getRandomPositionOnSphere(radius) {
            // 使用球坐标系生成均匀分布的点
            const theta = Math.random() * Math.PI * 2; // 0 到 2π
            const phi = Math.acos(2 * Math.random() - 1); // 0 到 π，确保均匀分布
            
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            
            return { x, y, z };
        }
        
        // 创建敌人球体
        function createEnemySphere(word) {
            const spawnRadius = 800; // 生成半径
            const position = getRandomPositionOnSphere(spawnRadius);
            
            // 计算移动速度
            const speeds = [9, 10, 11, 12, 13, 14, 15, 16];
            const probabilities = [0.09, 0.1, 0.11, 0.12, 0.13, 0.14, 0.15, 0.16];
            const rand = Math.random();
            let cumulativeProb = 0;
            let selectedSpeed = 15;
            for (let i = 0; i < speeds.length; i++) {
                cumulativeProb += probabilities[i];
                if (rand < cumulativeProb) {
                    selectedSpeed = speeds[i];
                    break;
                }
            }
            
            // 根据速度选择不同的几何形状
            let geometry;
            const size = 20; // 基础尺寸
            
            if (selectedSpeed === 9 || selectedSpeed === 10) {
                // 正四面体
                geometry = new THREE.TetrahedronGeometry(size);
            } else if (selectedSpeed === 11 || selectedSpeed === 12) {
                // 正方体
                geometry = new THREE.BoxGeometry(size * 1.5, size * 1.5, size * 1.5);
            } else if (selectedSpeed === 13) {
                // 正八面体
                geometry = new THREE.OctahedronGeometry(size);
            } else if (selectedSpeed === 14) {
                // 正十二面体
                geometry = new THREE.DodecahedronGeometry(size);
            } else if (selectedSpeed === 15) {
                // 正二十面体
                geometry = new THREE.IcosahedronGeometry(size);
            } else { // selectedSpeed === 16
                // 球体
                geometry = new THREE.SphereGeometry(size, 16, 16);
            }
            
            const material = new THREE.MeshPhongMaterial({
                color: 0xc08080, // 低饱和度红色
                emissive: 0x805050, // 深红发光
                shininess: 60
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(position.x, position.y, position.z);
            
            // 添加随机自转速度（每个轴都有随机的旋转速度）
            mesh.rotationSpeed = {
                x: (Math.random() - 0.5) * 0.04, // -0.02 到 0.02
                y: (Math.random() - 0.5) * 0.04,
                z: (Math.random() - 0.5) * 0.04
            };
            
            scene.add(mesh);
            
            const duration = selectedSpeed * 1000; // 转换为毫秒
            const speed = spawnRadius / (duration / 50); // 每50ms移动的距离
            
            // 创建文字标签
            const labelDiv = document.createElement('div');
            labelDiv.className = 'word-label-3d';
            labelDiv.innerHTML = `
                <div class="pinyin">${word.pinyin}</div>
                <div class="word-text">${word.word}</div>
            `;
            document.body.appendChild(labelDiv);
            
            const enemy = {
                id: word.id,
                word: word.word,
                pinyin: word.pinyin,
                mesh: mesh,
                label: labelDiv,
                speed: speed,
                speedType: selectedSpeed, // 保存速度类型用于计算伤害
                x: position.x,
                y: position.y,
                z: position.z
            };
            
            enemySpheres.push(enemy);
            wordLabels.push({ id: word.id, element: labelDiv, enemy: enemy });
            
            return enemy;
        }
        
        // 更新3D场景
        function update3DScene() {
            if (!scene || !camera || !renderer) return;
            
            // 移动敌人球体
            enemySpheres = enemySpheres.map(enemy => {
                // 检查是否正在传送
                if (enemy.teleporting) {
                    const elapsed = Date.now() - enemy.teleportStartTime;
                    const duration = 500; // 0.5秒
                    
                    if (elapsed < duration) {
                        // 正在传送中，使用缓动函数插值
                        const t = elapsed / duration;
                        // 使用easeInOutQuad缓动
                        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                        
                        enemy.x = enemy.startX + (enemy.targetX - enemy.startX) * eased;
                        enemy.y = enemy.startY + (enemy.targetY - enemy.startY) * eased;
                        enemy.z = enemy.startZ + (enemy.targetZ - enemy.startZ) * eased;
                        
                        enemy.mesh.position.set(enemy.x, enemy.y, enemy.z);
                    } else {
                        // 传送完成
                        enemy.x = enemy.targetX;
                        enemy.y = enemy.targetY;
                        enemy.z = enemy.targetZ;
                        enemy.mesh.position.set(enemy.x, enemy.y, enemy.z);
                        
                        // 清除传送标记
                        enemy.teleporting = false;
                        delete enemy.startX;
                        delete enemy.startY;
                        delete enemy.startZ;
                        delete enemy.targetX;
                        delete enemy.targetY;
                        delete enemy.targetZ;
                        delete enemy.teleportStartTime;
                    }
                    
                    // 传送期间也更新自转
                    if (enemy.mesh.rotationSpeed) {
                        enemy.mesh.rotation.x += enemy.mesh.rotationSpeed.x;
                        enemy.mesh.rotation.y += enemy.mesh.rotationSpeed.y;
                        enemy.mesh.rotation.z += enemy.mesh.rotationSpeed.z;
                    }
                    
                    return enemy;
                }
                
                // 检查这个敌人是否被冻结
                if (enemy.frozen) {
                    // 冻结状态下不移动，但继续自转
                    if (enemy.mesh.rotationSpeed) {
                        enemy.mesh.rotation.x += enemy.mesh.rotationSpeed.x;
                        enemy.mesh.rotation.y += enemy.mesh.rotationSpeed.y;
                        enemy.mesh.rotation.z += enemy.mesh.rotationSpeed.z;
                    }
                    return enemy;
                }
                
                // 计算指向中心的方向
                const distance = Math.sqrt(enemy.x * enemy.x + enemy.y * enemy.y + enemy.z * enemy.z);
                const dirX = -enemy.x / distance;
                const dirY = -enemy.y / distance;
                const dirZ = -enemy.z / distance;
                
                // 更新位置
                enemy.x += dirX * enemy.speed;
                enemy.y += dirY * enemy.speed;
                enemy.z += dirZ * enemy.speed;
                
                enemy.mesh.position.set(enemy.x, enemy.y, enemy.z);
                
                // 更新自转
                if (enemy.mesh.rotationSpeed) {
                    enemy.mesh.rotation.x += enemy.mesh.rotationSpeed.x;
                    enemy.mesh.rotation.y += enemy.mesh.rotationSpeed.y;
                    enemy.mesh.rotation.z += enemy.mesh.rotationSpeed.z;
                }
                
                // 检查敌人是否在相机后面（z > camera.position.z），如果是则移除（修复问题2）
                if (enemy.z > camera.position.z) {
                    // 敌人飞到相机后面了，移除
                    movingWords = movingWords.filter(w => w.id !== enemy.id);
                    scene.remove(enemy.mesh);
                    enemy.mesh.geometry.dispose();
                    enemy.mesh.material.dispose();
                    if (enemy.label && enemy.label.parentNode) {
                        enemy.label.parentNode.removeChild(enemy.label);
                    }
                    return null;
                }
                
                // 检查碰撞（距离中心小于70）
                const newDistance = Math.sqrt(enemy.x * enemy.x + enemy.y * enemy.y + enemy.z * enemy.z);
                if (newDistance < 70) {
                    // 碰撞逻辑
                    if (shieldCount > 0) {
                        shieldCount--;
                        playSound(900, 0.15, 'triangle'); // 护盾被消耗的音效
                        updateShieldDisplay();
                    } else {
                        // 根据敌人形状（速度类型）计算固定伤害
                        let damage;
                        if (enemy.speedType === 9 || enemy.speedType === 10) {
                            damage = 5; // 正四面体：5点伤害
                        } else if (enemy.speedType === 11 || enemy.speedType === 12) {
                            damage = 6; // 正方体：6点伤害
                        } else if (enemy.speedType === 13) {
                            damage = 7; // 正八面体：7点伤害
                        } else if (enemy.speedType === 14) {
                            damage = 8; // 正十二面体：8点伤害
                        } else if (enemy.speedType === 15) {
                            damage = 9; // 正二十面体：9点伤害
                        } else { // speedType === 16
                            damage = 10; // 球体：10点伤害
                        }
                        
                        health = Math.max(0, health - damage);
                        playSound(200, 0.3, 'sawtooth'); // 敌人撞到主角的音效
                        updateSurvivalHealth();
                        
                        if (health <= 0 && hasReviveArmor) {
                            health = 20; // 复活甲触发时恢复至20点生命值
                            hasReviveArmor = false;
                            updateSurvivalHealth();
                            playSound(1600, 0.4, 'square'); // 复活甲被消耗的音效
                            updateReviveArmorDisplay();
                        } else if (health <= 0) {
                            // 游戏结束
                            setTimeout(() => {
                                gameState = 'finished';
                                clearIntervals();
                                document.removeEventListener('keydown', handleEscKey);
                                window.removeEventListener('resize', handleWindowResizeWarning);
                                cleanup3DScene();
                                render();
                            }, 100);
                        }
                    }
                    
                    // 从movingWords数组中移除（修复问题1：碰撞后仍能得分）
                    movingWords = movingWords.filter(w => w.id !== enemy.id);
                    
                    // 移除这个敌人的3D对象
                    scene.remove(enemy.mesh);
                    enemy.mesh.geometry.dispose();
                    enemy.mesh.material.dispose();
                    if (enemy.label && enemy.label.parentNode) {
                        enemy.label.parentNode.removeChild(enemy.label);
                    }
                    return null;
                }
                
                return enemy;
            }).filter(e => e !== null);
            
            // 更新文字标签位置（投影到屏幕空间）
            wordLabels = wordLabels.filter(label => {
                const enemy = enemySpheres.find(e => e.id === label.id);
                if (!enemy) {
                    if (label.element && label.element.parentNode) {
                        label.element.parentNode.removeChild(label.element);
                    }
                    return false;
                }
                
                // 将3D位置投影到2D屏幕坐标
                const vector = new THREE.Vector3(enemy.x, enemy.y, enemy.z);
                vector.project(camera);
                
                // 计算屏幕坐标
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;
                
                // 隐藏条件：
                // 1. 在相机后面 (vector.z > 1)
                // 2. 投影坐标超出视口范围（不使用边距，让自然超出的就隐藏）
                const isOutOfView = x < 0 || x > window.innerWidth || 
                                   y < 0 || y > window.innerHeight;
                const isBehindCamera = vector.z > 1;
                
                if (isBehindCamera || isOutOfView) {
                    label.element.style.display = 'none';
                } else {
                    label.element.style.display = 'block';
                    label.element.style.left = x + 'px';
                    label.element.style.top = y + 'px';
                    label.element.style.transform = 'translate(-50%, -50%)';
                    
                    // 根据深度调整z-index
                    const distanceToCenter = Math.sqrt(enemy.x * enemy.x + enemy.y * enemy.y + enemy.z * enemy.z);
                    const maxDistance = 800; // 生成半径
                    const minDistance = 100; // 接近中心
                    
                    const normalizedDistance = Math.max(0, Math.min(1, (distanceToCenter - minDistance) / (maxDistance - minDistance)));
                    
                    // 计算z-index：越近越高，但始终低于UI(z-index=20)
                    // 距离100时z-index=15，距离800时z-index=2
                    const zIndex = Math.floor(2 + (1 - normalizedDistance) * 13);
                    label.element.style.zIndex = zIndex;
                }
                
                return true;
            });
            
            // 渲染场景
            renderer.render(scene, camera);
        }
        
        // 生成随机大招
        function generateUltimate() {
            const rand = Math.random();
            if (rand < 0.3) { // 30%
                currentUltimate = { word: '护盾', pinyin: 'hù dùn' };
            } else if (rand < 0.7) { // 40%（从30%提升到40%）
                currentUltimate = { word: '冻结', pinyin: 'dòng jié' };
            } else if (rand < 0.8) { // 10%（从20%降到10%）
                // 如果没有复活甲，给复活甲；否则给医疗包
                if (!hasReviveArmor) {
                    currentUltimate = { word: '复活甲', pinyin: 'fù huó jiǎ' };
                } else {
                    currentUltimate = { word: '医疗包', pinyin: 'yī liáo bāo' };
                }
            } else if (rand < 0.9) { // 10%
                currentUltimate = { word: '物换星移', pinyin: 'wù huàn xīng yí' };
            } else { // 10%
                currentUltimate = { word: '命运审判', pinyin: 'mìng yùn shěn pàn' };
            }
            updateUltimateDisplay();
        }
        
        // 执行大招效果
        function activateUltimate(ultimateName) {
            switch(ultimateName) {
                case '护盾':
                    if (shieldCount < 3) {
                        shieldCount++;
                        playSound(1000, 0.2, 'sine'); // 生成护盾的音效
                        updateShieldDisplay(); // 只更新护盾显示
                    }
                    break;
                    
                case '冻结':
                    // 只冻结当前存在的敌人
                    if (enemySpheres.length > 0) {
                        // 如果有旧的解冻计时器，先清除
                        if (frozenTimeout) {
                            clearTimeout(frozenTimeout);
                            frozenTimeout = null;
                        }
                        
                        // 记录被冻结的敌人ID
                        const frozenEnemyIds = new Set(enemySpheres.map(e => e.id));
                        
                        // 将所有当前敌人变成冰蓝色并标记为冻结
                        enemySpheres.forEach(enemy => {
                            if (enemy.mesh && enemy.mesh.material) {
                                enemy.mesh.material.color.setHex(0x6eb5ff); // 冰蓝色
                                enemy.mesh.material.emissive.setHex(0x4a90e2); // 淡蓝色发光
                                enemy.frozen = true; // 标记为冻结
                            }
                        });
                        
                        // 播放冻结音效
                        playSound(800, 0.3, 'sine');
                        setTimeout(() => playSound(600, 0.25, 'sine'), 100);
                        setTimeout(() => playSound(400, 0.2, 'sine'), 200);
                        
                        // 3秒后解除冻结并恢复颜色
                        frozenTimeout = setTimeout(() => {
                            // 只恢复被冻结的敌人（通过ID识别）
                            enemySpheres.forEach(enemy => {
                                if (frozenEnemyIds.has(enemy.id) && enemy.mesh && enemy.mesh.material) {
                                    enemy.mesh.material.color.setHex(0xc08080); // 低饱和度红色
                                    enemy.mesh.material.emissive.setHex(0x805050); // 深红发光
                                    enemy.frozen = false; // 解除冻结标记
                                }
                            });
                            frozenTimeout = null; // 清除引用
                        }, 3000);
                    }
                    // 如果没有敌人，大招浪费，不做任何事
                    break;
                    
                case '医疗包':
                    health = Math.min(100, health + 20); // 回复20点生命值，上限100
                    updateSurvivalHealth();
                    playSound(1200, 0.25, 'sine'); // 医疗包音效
                    break;
                    
                case '复活甲':
                    hasReviveArmor = true;
                    playSound(1400, 0.3, 'square'); // 生成复活甲的音效
                    updateReviveArmorDisplay(); // 只更新复活甲显示
                    break;
                    
                case '物换星移':
                    // 传送所有敌人到新位置
                    enemySpheres.forEach(enemy => {
                        // 如果敌人正在传送中，保持当前位置作为起点（平滑过渡）
                        // 否则使用当前实际位置
                        enemy.startX = enemy.x;
                        enemy.startY = enemy.y;
                        enemy.startZ = enemy.z;
                        
                        // 生成新的随机位置（在半径100-800之间的球面上）
                        const minRadius = 100;
                        const maxRadius = 800;
                        const newRadius = minRadius + Math.random() * (maxRadius - minRadius);
                        
                        // 使用球坐标系生成均匀分布的点
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos(2 * Math.random() - 1);
                        
                        enemy.targetX = newRadius * Math.sin(phi) * Math.cos(theta);
                        enemy.targetY = newRadius * Math.sin(phi) * Math.sin(theta);
                        enemy.targetZ = newRadius * Math.cos(phi);
                        
                        // 清除冻结状态（如果有）
                        if (enemy.frozen) {
                            enemy.frozen = false;
                            // 恢复为红色
                            if (enemy.mesh && enemy.mesh.material) {
                                enemy.mesh.material.color.setHex(0xc08080); // 低饱和度红色
                                enemy.mesh.material.emissive.setHex(0x805050); // 深红发光
                            }
                        }
                        
                        // 标记正在传送
                        enemy.teleporting = true;
                        enemy.teleportStartTime = Date.now();
                    });
                    
                    // 播放传送音效
                    playSound(1800, 0.4, 'sine');
                    setTimeout(() => playSound(1600, 0.3, 'sine'), 150);
                    setTimeout(() => playSound(2000, 0.2, 'sine'), 300);
                    break;
                    
                case '命运审判':
                    // 命运审判：必定消灭最近的敌人，其他敌人40%概率消灭
                    if (enemySpheres.length > 0) {
                        // 1. 找出离主角最近的敌人
                        let closestEnemy = enemySpheres[0];
                        let minDistance = Math.sqrt(closestEnemy.x * closestEnemy.x + 
                                                    closestEnemy.y * closestEnemy.y + 
                                                    closestEnemy.z * closestEnemy.z);
                        
                        enemySpheres.forEach(enemy => {
                            const distance = Math.sqrt(enemy.x * enemy.x + 
                                                       enemy.y * enemy.y + 
                                                       enemy.z * enemy.z);
                            if (distance < minDistance) {
                                minDistance = distance;
                                closestEnemy = enemy;
                            }
                        });
                        
                        // 2. 收集要消灭的敌人ID
                        const toDestroyIds = new Set();
                        
                        // 最近的敌人必定消灭
                        toDestroyIds.add(closestEnemy.id);
                        
                        // 其他敌人40%概率消灭（如果有其他敌人）
                        if (enemySpheres.length > 1) {
                            enemySpheres.forEach(enemy => {
                                if (enemy.id !== closestEnemy.id) {
                                    if (Math.random() < 0.4) { // 从0.5改为0.4
                                        toDestroyIds.add(enemy.id);
                                    }
                                }
                            });
                        }
                        
                        // 3. 清理被选中的敌人
                        enemySpheres.forEach(enemy => {
                            if (toDestroyIds.has(enemy.id)) {
                                if (enemy.mesh) {
                                    scene.remove(enemy.mesh);
                                    enemy.mesh.geometry.dispose();
                                    enemy.mesh.material.dispose();
                                }
                                if (enemy.label && enemy.label.parentNode) {
                                    enemy.label.parentNode.removeChild(enemy.label);
                                }
                            }
                        });
                        
                        // 4. 更新数组
                        enemySpheres = enemySpheres.filter(e => !toDestroyIds.has(e.id));
                        wordLabels = wordLabels.filter(l => !toDestroyIds.has(l.id));
                        movingWords = movingWords.filter(w => !toDestroyIds.has(w.id));
                    }
                    // 如果没有敌人，大招浪费，不做任何事
                    
                    // 命运审判的音效（更神秘、威严）
                    playSound(1500, 0.3, 'square');
                    setTimeout(() => playSound(2000, 0.2, 'square'), 100);
                    break;
            }
            
            // 清除当前大招
            currentUltimate = '';
            updateUltimateDisplay();
        }
        
        // 获取随机词组（确保最近100个不重复）
        function getRandomWord(wordList) {
            let attempts = 0;
            while (attempts < 100) {
                const randomIndex = Math.floor(Math.random() * wordList.length);
                const word = wordList[randomIndex];
                
                if (!recentWords.includes(word.word)) {
                    return word;
                }
                attempts++;
            }
            return wordList[Math.floor(Math.random() * wordList.length)];
        }

        // 更新最近词组列表
        function updateRecentWords(word) {
            recentWords.push(word);
            if (recentWords.length > 100) {
                recentWords = recentWords.slice(-100);
            }
        }

        // 播放音效
        function playSound(frequency, duration, type = 'sine') {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = type;
            oscillator.frequency.value = frequency;
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        // 开始游戏
        function startGame(mode) {
            clearIntervals();
            
            gameMode = mode;
            gameState = mode;
            timeLeft = mode === 'endless' ? 0 : 60; // 无尽模式正计时从0开始
            score = 0;
            health = 100;
            userInput = '';
            movingWords = [];
            elapsedTime = 0;
            recentWords = [];
            lastSpawnTime = 0;
            wordsTyped = 0;
            wordCount = 0;
            ultimateCharge = 0; // 初始化大招充能
            currentUltimate = ''; // 初始化当前大招
            shieldCount = 0; // 初始化护盾
            hasReviveArmor = false; // 初始化复活甲
            frozenTimeout = null; // 初始化冻结计时器
            
            if (mode === 'timed') {
                const word = getRandomWord(wordList);
                currentWord = word;
                updateRecentWords(word.word);
            }
            
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // 添加Esc键监听（仅无尽模式）
            if (mode === 'endless') {
                document.addEventListener('keydown', handleEscKey);
                // 记录初始窗口大小
                window.initialWidth = window.innerWidth;
                window.initialHeight = window.innerHeight;
                // 监听窗口大小改变
                window.addEventListener('resize', handleWindowResizeWarning);
            }
            
            // 先渲染DOM
            render();
            
            // 无尽模式下，DOM创建后再初始化3D场景
            if (mode === 'endless') {
                init3DScene();
            }
            
            startTimer();
            if (mode === 'endless') {
                startSpawning();
                startMoving();
            }
        }
        
        // 处理窗口大小改变警告
        function handleWindowResizeWarning() {
            if (gameState !== 'endless') return;
            
            // 检测窗口大小是否真的改变了（排除移动浏览器地址栏显示/隐藏的影响）
            const widthChanged = Math.abs(window.innerWidth - window.initialWidth) > 50;
            const heightChanged = Math.abs(window.innerHeight - window.initialHeight) > 50;
            
            if (widthChanged || heightChanged) {
                // 窗口大小改变，结束游戏
                gameState = 'finished';
                clearIntervals();
                document.removeEventListener('keydown', handleEscKey);
                window.removeEventListener('resize', handleWindowResizeWarning);
                
                // 显示警告消息
                alert('检测到窗口大小改变，游戏已结束。');
                render();
            }
        }
        
        // 处理Esc键
        function handleEscKey(e) {
            if (e.key === 'Escape' && gameState === 'endless') {
                document.removeEventListener('keydown', handleEscKey);
                backToHome();
            }
        }

        // 清除所有计时器
        function clearIntervals() {
            if (timerInterval) clearInterval(timerInterval);
            if (spawnInterval) clearInterval(spawnInterval);
            if (moveInterval) clearInterval(moveInterval);
            if (frozenTimeout) {
                clearTimeout(frozenTimeout);
                frozenTimeout = null;
            }
        }

        // 开始倒计时
        function startTimer() {
            timerInterval = setInterval(() => {
                if (gameState === 'timed' && timeLeft > 0 && health > 0) {
                    timeLeft--;
                    
                    // 更新时间显示
                    const timeDisplay = document.getElementById('timeDisplay');
                    if (timeDisplay) timeDisplay.textContent = timeLeft;
                    
                    if (timeLeft === 0) {
                        gameState = 'finished';
                        clearIntervals();
                        render();
                    }
                } else if (gameState === 'endless' && health > 0) {
                    timeLeft++; // 无尽模式正计时
                    elapsedTime++;
                    
                    // 更新时间显示
                    const timeDisplay = document.querySelector('.top-center .stat-value');
                    if (timeDisplay) {
                        const minutes = Math.floor(timeLeft / 60);
                        const seconds = timeLeft % 60;
                        timeDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                    }
                }
            }, 1000);
        }

        // 无尽模式：生成词组
        function startSpawning() {
            // 立即生成第一个词
            spawnWord();
            
            spawnInterval = setInterval(() => {
                if (gameState !== 'endless' || health <= 0) return;
                
                // 计算下一个词的生成时间间隔（秒）
                let spawnIntervalTime;
                if (wordCount === 0) {
                    spawnIntervalTime = 0;
                } else {
                    // 第n个词的间隔 = 60 / (20 + (n-2)/10) 秒
                    // n从2开始，wordCount从1开始，所以 n = wordCount + 1
                    const n = wordCount + 1;
                    spawnIntervalTime = 60 / (20 + (n - 2) / 10);
                }
                
                const elapsed = timeLeft;
                
                if ((elapsed - lastSpawnTime) >= spawnIntervalTime) {
                    spawnWord();
                }
            }, 100);
        }
        
        // 生成单个词组
        function spawnWord() {
            if (movingWords.length >= 20) return;
            
            lastSpawnTime = timeLeft;
            wordCount++;
            
            const existingWordTexts = movingWords.map(w => w.word);
            let newWordData = wordList[Math.floor(Math.random() * wordList.length)];
            let attempts = 0;
            
            while ((existingWordTexts.includes(newWordData.word) || recentWords.includes(newWordData.word)) && attempts < 30) {
                newWordData = wordList[Math.floor(Math.random() * wordList.length)];
                attempts++;
            }
            
            recentWords.push(newWordData.word);
            if (recentWords.length > 100) {
                recentWords = recentWords.slice(-100);
            }
            
            const newWord = {
                ...newWordData,
                id: Date.now() + Math.random()
            };
            
            movingWords.push(newWord);
            
            // 创建3D敌人球体
            createEnemySphere(newWord);
        }

        // 移动词组
        function startMoving() {
            moveInterval = setInterval(() => {
                if (gameState === 'endless' && health > 0) {
                    // 更新3D场景
                    update3DScene();
                }
            }, 50);
        }
        
        // 更新移动词组的位置（保留但不再使用）
        function updateMovingWordsPosition() {
            // 3D模式下不需要此函数，但保留以避免错误
        }

        // 处理输入
        function handleInputChange(e) {
            userInput = e.target.value;

            if (gameState === 'timed') {
                if (userInput === currentWord.word) {
                    score += currentWord.word.length; // 按字数计分
                    userInput = '';
                    const newWord = getRandomWord(wordList);
                    currentWord = newWord;
                    updateRecentWords(newWord.word);
                    e.target.value = '';
                    // 只更新得分和词组显示，不重新渲染整个页面
                    updateTimedDisplay();
                }
            } else if (gameState === 'endless') {
                // 检查是否输入大招（不增加大招充能）
                if (currentUltimate && userInput === currentUltimate.word) {
                    userInput = '';
                    e.target.value = '';
                    activateUltimate(currentUltimate.word);
                    return;
                }
                
                const matchedWord = movingWords.find(w => w.word === userInput);
                if (matchedWord) {
                    // 不再回复生命值
                    wordsTyped += matchedWord.word.length; // 记录输对的字数
                    ultimateCharge += matchedWord.word.length; // 大招充能
                    userInput = '';
                    e.target.value = '';
                    // 消灭敌人的音效
                    playSound(800, 0.2, 'square');
                    setTimeout(() => playSound(1200, 0.1, 'square'), 50);
                    movingWords = movingWords.filter(w => w.id !== matchedWord.id);
                    
                    // 移除对应的3D球体和标签
                    const enemy = enemySpheres.find(e => e.id === matchedWord.id);
                    if (enemy) {
                        scene.remove(enemy.mesh);
                        enemy.mesh.geometry.dispose();
                        enemy.mesh.material.dispose();
                        if (enemy.label && enemy.label.parentNode) {
                            enemy.label.parentNode.removeChild(enemy.label);
                        }
                        enemySpheres = enemySpheres.filter(e => e.id !== matchedWord.id);
                        wordLabels = wordLabels.filter(l => l.id !== matchedWord.id);
                    }
                    
                    // 不需要更新血量显示（因为血量没变）
                    
                    // 检查是否触发生成大招（充能>=20）
                    if (ultimateCharge >= 20) {
                        ultimateCharge = 0; // 充能清零
                        generateUltimate(); // 生成新大招
                    }
                }
            }
        }
        
        // 更新限时计分模式显示
        function updateTimedDisplay() {
            const timeDisplay = document.getElementById('timeDisplay');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const pinyinDisplay = document.getElementById('pinyinDisplay');
            const wordDisplay = document.getElementById('wordDisplay');
            
            if (timeDisplay) timeDisplay.textContent = timeLeft;
            if (scoreDisplay) scoreDisplay.textContent = score;
            if (pinyinDisplay) pinyinDisplay.textContent = currentWord.pinyin;
            if (wordDisplay) wordDisplay.textContent = currentWord.word;
        }
        
        // 更新生存模式血量显示
        function updateSurvivalHealth() {
            const healthDisplay = document.getElementById('healthDisplay');
            if (healthDisplay) healthDisplay.textContent = health;
        }
        
        // 更新护盾显示
        function updateShieldDisplay() {
            const container = document.querySelector('.shield-container');
            if (shieldCount > 0) {
                const shieldsHTML = Array(shieldCount).fill(0).map(() => `
                    <div class="shield-icon">🛡️</div>
                `).join('');
                
                if (container) {
                    container.innerHTML = shieldsHTML;
                } else {
                    // 如果容器不存在，需要创建
                    const mainContainer = document.querySelector('.relative.min-h-screen');
                    if (mainContainer) {
                        const shieldDiv = document.createElement('div');
                        shieldDiv.className = 'shield-container';
                        shieldDiv.innerHTML = shieldsHTML;
                        mainContainer.appendChild(shieldDiv);
                    }
                }
            } else {
                // 没有护盾，移除容器
                if (container) {
                    container.remove();
                }
            }
        }
        
        // 更新复活甲显示
        function updateReviveArmorDisplay() {
            const healthInner = document.querySelector('.health-inner');
            if (healthInner) {
                if (hasReviveArmor) {
                    healthInner.classList.add('health-inner-revive');
                } else {
                    healthInner.classList.remove('health-inner-revive');
                }
            }
        }
        
        // 更新大招显示
        function updateUltimateDisplay() {
            const ultimateDisplay = document.getElementById('ultimateDisplay');
            if (ultimateDisplay) {
                if (currentUltimate && currentUltimate.word) {
                    // 移除所有大招颜色类
                    ultimateDisplay.className = 'ultimate-display';
                    
                    // 根据大招类型添加对应的颜色类
                    switch(currentUltimate.word) {
                        case '护盾':
                            ultimateDisplay.classList.add('ultimate-shield');
                            break;
                        case '冻结':
                            ultimateDisplay.classList.add('ultimate-freeze');
                            break;
                        case '医疗包':
                            ultimateDisplay.classList.add('ultimate-firstaid');
                            break;
                        case '复活甲':
                            ultimateDisplay.classList.add('ultimate-revive');
                            break;
                        case '物换星移':
                            ultimateDisplay.classList.add('ultimate-teleport');
                            break;
                        case '命运审判':
                            ultimateDisplay.classList.add('ultimate-judgment');
                            break;
                    }
                    
                    ultimateDisplay.innerHTML = `
                        <div class="pinyin" style="font-size: 0.875rem; margin-bottom: 0.25rem;">${currentUltimate.pinyin}</div>
                        <div>${currentUltimate.word}</div>
                    `;
                    ultimateDisplay.style.display = 'block';
                } else {
                    ultimateDisplay.style.display = 'none';
                    ultimateDisplay.className = 'ultimate-display'; // 清除颜色类
                }
            }
        }

        // 返回主界面
        function backToHome() {
            clearIntervals();
            document.removeEventListener('keydown', handleEscKey); // 移除Esc键监听
            window.removeEventListener('resize', handleWindowResizeWarning); // 移除resize监听
            cleanup3DScene(); // 清理3D场景
            gameState = 'home';
            movingWords = [];
            render();
        }

            } else if (gameState === 'timed') {
                app.innerHTML = `
                    <div class="container bg-gradient-blue">
                        <div class="game-container">
                            <div class="stats">
                                <div class="stat">
                                    时间: <span class="stat-value" id="timeDisplay">${timeLeft}</span>秒
                                </div>
                                <div class="stat">
                                    得分: <span class="stat-value" id="scoreDisplay">${score}</span>
                                </div>
                            </div>

                            <div class="word-display">
                                <div class="pinyin" id="pinyinDisplay">${currentWord.pinyin}</div>
                                <div class="word" id="wordDisplay">${currentWord.word}</div>
                            </div>

                            <div class="input-wrapper">
                                <input id="inputField" type="text" value="${userInput}" onpaste="return false" autocomplete="off" autofocus>
                            </div>

                            <div style="display: flex; justify-content: center;">
                                <button onclick="backToHome()" class="btn btn-secondary">
                                    返回
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                const input = document.getElementById('inputField');
                if (input) {
                    input.addEventListener('input', handleInputChange);
                    // 禁止粘贴作弊
                    input.addEventListener('paste', (e) => {
                        e.preventDefault();
                        return false;
                    });
                    input.focus();
                }
            } else if (gameState === 'endless') {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                
                // 生成护盾图标HTML
                const shieldsHTML = Array(shieldCount).fill(0).map(() => `
                    <div class="shield-icon">🛡️</div>
                `).join('');
                
                app.innerHTML = `
                    <div class="relative min-h-screen bg-gradient-red overflow-hidden">
                        <!-- 3D场景容器 -->
                        <div id="three-container"></div>
                        
                        <div class="top-center">
                            <div class="stat" style="color: #6b7280;">
                                时间: <span class="stat-value">${minutes}:${seconds.toString().padStart(2, '0')}</span>
                            </div>
                        </div>
                        
                        ${shieldCount > 0 ? `<div class="shield-container">${shieldsHTML}</div>` : ''}

                        <div class="fixed-center z-20">
                            <div class="health-circle">
                                <div class="health-inner ${hasReviveArmor ? 'health-inner-revive' : ''}">
                                    <span class="health-value" id="healthDisplay">${health}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="input-top-below z-20">
                            <input id="inputField" type="text" value="${userInput}" class="survival-input" onpaste="return false" autocomplete="off" autofocus>
                        </div>
                        
                        <div id="ultimateDisplay" class="ultimate-display" style="display: ${currentUltimate && currentUltimate.word ? 'block' : 'none'};">
                            ${currentUltimate && currentUltimate.word ? `
                                <div class="pinyin" style="font-size: 0.875rem; margin-bottom: 0.25rem;">${currentUltimate.pinyin}</div>
                                <div>${currentUltimate.word}</div>
                            ` : ''}
                        </div>
                    </div>
                `;
                
                const input = document.getElementById('inputField');
                if (input) {
                    input.addEventListener('input', handleInputChange);
                    // 禁止粘贴作弊
                    input.addEventListener('paste', (e) => {
                        e.preventDefault();
                        return false;
                    });
                    input.focus();
                }
            } else if (gameState === 'finished') {
                let isVictory = false;
                let message = '';
                let survivedTime, minutes, seconds, timeString;
                
                if (gameMode === 'timed') {
                    survivedTime = 60 - timeLeft;
                    minutes = Math.floor(survivedTime / 60);
                    seconds = survivedTime % 60;
                    timeString = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
                    isVictory = timeLeft === 0;
                    message = '时间到！';
                } else if (gameMode === 'endless') {
                    // 无尽模式显示坚持时间和平均速度
                    survivedTime = timeLeft; // 正计时，timeLeft就是坚持的秒数
                    minutes = Math.floor(survivedTime / 60);
                    seconds = survivedTime % 60;
                    timeString = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
                    const avgSpeed = survivedTime > 0 ? Math.round(wordsTyped / (survivedTime / 60)) : 0;
                    message = '游戏结束';
                }
                
                const color = isVictory ? '#10b981' : '#ef4444';
                
                app.innerHTML = `
                    <div class="result-container bg-gradient-blue">
                        <div class="result-card">
                            <h2 class="result-title" style="color: ${color};">
                                ${message}
                            </h2>
                            ${gameMode === 'timed' ? `
                                <div class="result-score" style="color: #4f46e5;">${score} 分</div>
                                ${!isVictory ? `<div class="result-time">用时: ${timeString}</div>` : ''}
                            ` : ''}
                            ${gameMode === 'endless' ? `
                                <div class="result-score" style="color: ${color};">
                                    ${Math.round(wordsTyped / (survivedTime / 60))} 字/分钟
                                </div>
                                <div class="result-time">坚持时间: ${timeString}</div>
                            ` : ''}
                            <button onclick="backToHome()" class="btn btn-primary">
                                确定
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        // 初始渲染
        render();
    </script>
</body>
</html>
